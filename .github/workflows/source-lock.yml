name: Verify source lock

on:
  push:
    branches: [main]
    paths:
      - sources.lock.json
      - tools/verify_sources.sh
      - .github/workflows/source-lock.yml
  pull_request:
    paths:
      - sources.lock.json
      - tools/verify_sources.sh
      - .github/workflows/source-lock.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out locked revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify canonical repositories and immutable source tags
        run: tools/verify_sources.sh
