name: Verify source lock

on:
  push:
    branches: [main]
    paths:
      - sources.lock.json
      - tools/verify_sources.sh
      - .github/workflows/source-lock.yml
  pull_request:
    paths:
      - sources.lock.json
      - tools/verify_sources.sh
      - .github/workflows/source-lock.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out locked revision
        uses: actions/checkout@9c091d7d4d6f1b22f9f8d4b4ad0d9bbfca11c4a5 # v7.0.0
      - name: Verify canonical repositories and immutable source tags
        run: tools/verify_sources.sh
